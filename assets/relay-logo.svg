<svg width="480" height="120" viewBox="0 0 480 120" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Relay">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- icon: a local node routing out to a cloud node -->
  <g transform="translate(8 12)">
    <rect x="0" y="0" width="96" height="96" rx="22" fill="url(#g)"/>
    <!-- routing path -->
    <path d="M28 68 L48 48 L68 28" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.95"/>
    <path d="M48 48 L70 62" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.55"/>
    <!-- nodes -->
    <circle cx="28" cy="68" r="9" fill="#ffffff"/>
    <circle cx="48" cy="48" r="7" fill="#ffffff"/>
    <circle cx="68" cy="28" r="9" fill="#ffffff"/>
    <circle cx="70" cy="62" r="6" fill="#ffffff" opacity="0.7"/>
  </g>

  <!-- wordmark -->
  <text x="124" y="62" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="52" font-weight="700" fill="#1f2937">Relay</text>
  <text x="126" y="92" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="17" font-weight="500" fill="#6b7280" letter-spacing="0.5">local-first model router</text>
</svg>
